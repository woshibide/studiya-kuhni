title: Портфолио

sections:
  posts:
    type: pages
    headline: Посты
    templates:
      - portfolio-post
    layout: cards

  content:
    type: fields
    fields:
      title:
        type: text
      cta_heading:
        label: заголовок cta
        type: text
        default: Call to Action
      cta_text:
        label: текст cta
        type: textarea
        default: Оставьте Заявку или Свяжитесь с Нами
      cta_button:
        label: кнопка cta
        type: text
        default: Свяжитесь со мной