title: Кухня

tabs:
  card:
    label: Карточка
    columns:
      - width: 2/3
        sections:
          main:
            type: fields
            fields:
              title:
                type: text
              intro:
                label: краткое описание
                type: textarea
                buttons: false
                size: small
                maxlength: 180
                placeholder: краткое описание кухни до 180 символов
                default: Сдержанная кухня с продуманной эргономикой, аккуратными линиями и практичными материалами для комфортной жизни.

      - width: 1/3
        sections:
          facts:
            type: fields
            fields:
              country_of_origin:
                label: страна происхождения
                type: text
                placeholder: Италия
                default: Италия
              price:
                label: цена
                type: text
                placeholder: от 0,000,000 рублей
                default: от 0,000,000 рублей
              kitchen_specs:
                label: дополнительные пункты
                type: structure
                help: добавляйте дополнительные характеристики для карточки кухни
                columns:
                  label:
                    width: 1/3
                  value:
                    width: 2/3
                fields:
                  label:
                    label: пункт
                    type: text
                    required: true
                  value:
                    label: значение
                    type: text
              kitchen_gallery_images:
                label: фото для галерей
                type: files
                multiple: true
                layout: cards
                query: page.images.filterBy("type", "image")
                help: выберите только фотографии, которые должны использоваться в карточках и слайдерах
  page:
    label: Страница
    columns:
      - width: 2/3
        sections:
          features_section:
            type: fields
            fields:
              features_headline:
                label: Детали
                type: headline
              kitchen_features:
                label: блок деталей
                type: structure
                help: добавляйте изображение и короткий текст до 80 символов
                columns:
                  image:
                    width: 1/3
                  text:
                    width: 2/3
                fields:
                  image:
                    label: изображение
                    type: files
                    max: 1
                    query: page.images
                  text:
                    label: текст
                    type: text
                    maxlength: 80
                    required: true
          benefits_section:
            type: fields
            fields:
              benefits_headline_ui:
                label: Преимущества
                type: headline
              benefits_heading:
                label: заголовок преимуществ
                type: text
                default: Преимущества
              benefits_items:
                extends: fields/benefits
          cta_section:
            type: fields
            fields:
              cta_headline_ui:
                label: cta
                type: headline
              cta_heading:
                label: заголовок cta
                type: text
                default: Отпразднуем вашу новую кухню?
              cta_text:
                label: текст cta
                type: textarea
                size: small
                buttons: false
                default: Lorem ipsum dolor sit amet consectetur adipiscing elit quisque faucibus ex sapien vitae pellentesque sem placerat in id cursus mi pretium tellus duis convallis tempus leo eu aenean sed diam.
              cta_button:
                label: кнопка cta
                type: text
                default: Свяжитесь со мной

      - width: 1/3
        sections:
          files_section:
            label: изображения страницы
            type: files
