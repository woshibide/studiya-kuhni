title: Default Page

tabs:
  content:
    label: Контент
    columns:
      - width: 2/3
        sections:
          content_fields:
            type: fields
            fields:
              text:
                type: textarea
                size: huge
      - width: 1/3
        sections:
          child_pages:
            type: pages
            template: default
          files:
            type: files

  cta:
    label: CTA
    sections:
      cta_fields:
        type: fields
        fields:
          cta_heading:
            label: заголовок cta
            type: text
            default: Call to Action
          cta_text:
            label: текст cta
            type: textarea
            size: small
            buttons: false
            default: Lorem ipsum dolor sit amet consectetur adipiscing elit quisque faucibus ex sapien vitae pellentesque sem placerat in id cursus mi pretium tellus duis convallis tempus leo eu aenean sed diam.
          cta_button:
            label: кнопка cta
            type: text
            default: Свяжитесь со мной

