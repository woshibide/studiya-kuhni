title: Портфолио — пост

columns:
  main:
    width: 2/3
    sections:
      content:
        type: fields
        fields:
          title:
            type: text

          intro:
            label: интро
            type: textarea
            maxlength: 220
            counter: true
            buttons: false
            size: small

          cover:
            label: обложка
            type: files
            max: 1
            layout: cards
            query: page.images

          date:
            label: дата
            type: date
            default: today

          blocks:
            label: блоки
            type: blocks

  sidebar:
    width: 1/3
    sections:
      files:
        type: files
