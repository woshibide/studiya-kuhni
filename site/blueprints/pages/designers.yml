title: Designers

tabs:
  content:
    label: Контент
    columns:
      - width: 2/3
        sections:
          main:
            type: fields
            fields:
              title:
                type: text
              simple_hero_heading:
                label: заголовок simple hero
                type: text
                help: если пусто, используется название страницы
              simple_hero_description:
                label: описание simple hero
                type: textarea
                size: small
                buttons: false
              simple_hero_button_label:
                label: текст кнопки simple hero
                type: text
                placeholder: давайте)
              big_message:
                label: большое сообщение
                type: text
                default: Кухни, созданные для вашей жизни
              benefits_heading:
                label: заголовок преимуществ
                type: text
                default: Преимущества
              benefits_items:
                extends: fields/benefits
              designers_proof_heading:
                label: заголовок блока дизайнеров
                type: text
                default: С нами работают
              designers_cards:
                label: карточки дизайнеров
                type: structure
                columns:
                  name:
                    label: имя
                    width: 1/3
                  years:
                    label: лет сотрудничества
                    width: 1/4
                  projects:
                    label: проектов
                    width: 1/4
                fields:
                  name:
                    label: имя
                    type: text
                    required: true
                  image:
                    label: фото
                    type: files
                    max: 1
                    layout: cards
                    query: page.images
                  years:
                    label: сотрудничаем лет
                    type: number
                    min: 0
                    step: 1
                    required: true
                  portfolio_url:
                    label: ссылка на портфолио
                    type: url
                  projects:
                    label: сделали проектов
                    type: number
                    min: 0
                    step: 1
                    required: true
                  description:
                    label: текст справа снизу
                    type: textarea
                    size: small
                    buttons: false
                    default: Lorem ipsum dolor sit amet consectetur adipiscing elit quisque faucibus ex sapien vitae pellentesque sem placerat in id cursus mi pretium tellus.
      - width: 1/3
        sections:
          files:
            type: files

  cta:
    label: CTA
    sections:
      cta_fields:
        type: fields
        fields:
          cta_heading:
            label: заголовок cta
            type: text
            default: Отпразднуем вашу новую кухню?
          cta_text:
            label: текст cta
            type: textarea
            size: small
            buttons: false
            default: Lorem ipsum dolor sit amet consectetur adipiscing elit quisque faucibus ex sapien vitae pellentesque sem placerat in id cursus mi pretium tellus duis convallis tempus leo eu aenean sed diam.
          cta_button:
            label: кнопка cta
            type: text
            default: Свяжитесь со мной