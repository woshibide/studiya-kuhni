title: Фабрики

tabs:
  content:
    label: Контент страницы
    sections:
      hero:
        type: fields
        fields:
          title:
            label: заголовок hero
            type: text
          simple_hero_heading:
            label: заголовок simple hero
            type: text
            help: если пусто, используется название страницы
          simple_hero_description:
            label: описание simple hero
            type: textarea
            size: small
            buttons: false
          simple_hero_button_label:
            label: текст кнопки simple hero
            type: text
            placeholder: давайте)

      brands:
        type: pages
        headline: Фабрики (бренды)
        templates:
          - fabric
        layout: cards

      big_message:
        type: fields
        fields:
          big_message:
            label: большое сообщение
            type: text
            default: Кухни, созданные для вашей жизни


  benefits:
    label: Преимущества
    columns:
      - width: 2/3
        sections:
          benefits:
            type: fields
            fields:
              benefits_heading:
                label: заголовок преимуществ
                type: text
                default: Преимущества
              benefits_items:
                extends: fields/benefits
      - width: 1/3
        sections:
          files:
            type: files

  cta:
    label: CTA
    sections:
      cta:
        type: fields
        fields:
          cta_heading:
            label: заголовок cta
            type: text
            default: Отпразднуем вашу новую кухню?
          cta_text:
            label: текст cta
            type: textarea
            size: small
            buttons: false
            default: Lorem ipsum dolor sit amet consectetur adipiscing elit quisque faucibus ex sapien vitae pellentesque sem placerat in id cursus mi pretium tellus duis convallis tempus leo eu aenean sed diam.
          cta_button:
            label: кнопка cta
            type: text
            default: Свяжитесь со мной
