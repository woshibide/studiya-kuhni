title: Фабрики

tabs:
  content:
    label: Контент страницы
    sections:
      hero:
        type: fields
        fields:
          title:
            label: заголовок hero
            type: text

      brands:
        type: pages
        headline: Фабрики (бренды)
        templates:
          - fabric
        layout: cards

      big_message:
        type: fields
        fields:
          big_message:
            label: большое сообщение
            type: text
            default: Кухни, созданные для вашей жизни


  benefits:
    label: Преимущества
    sections:
      benefits:
        type: fields
        fields:
          benefits_heading:
            label: заголовок преимуществ
            type: text
            default: Преимущества
          benefits_items:
            extends: fields/benefits

  cta:
    label: CTA
    sections:
      cta:
        type: fields
        fields:
          cta_heading:
            label: заголовок cta
            type: text
            default: Call to Action
          cta_text:
            label: текст cta
            type: textarea
            size: small
            buttons: false
            default: Lorem ipsum dolor sit amet consectetur adipiscing elit quisque faucibus ex sapien vitae pellentesque sem placerat in id cursus mi pretium tellus duis convallis tempus leo eu aenean sed diam.
          cta_button:
            label: кнопка cta
            type: text
            default: Свяжитесь со мной
