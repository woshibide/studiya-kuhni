title: Proizvodstvo

tabs:
  gallery:
    label: Галерея
    sections:
      gallery_fields:
        type: fields
        fields:
          gallery_heading:
            label: заголовок галереи
            type: text
            default: Галерея
          gallery_images:
            extends: fields/gallery

  cta:
    label: CTA
    sections:
      cta_fields:
        type: fields
        fields:
          cta_heading:
            label: заголовок cta
            type: text
            default: Call to Action
          cta_text:
            label: текст cta
            type: textarea
            size: small
            buttons: false
            default: Lorem ipsum dolor sit amet consectetur adipiscing elit quisque faucibus ex sapien vitae pellentesque sem placerat in id cursus mi pretium tellus duis convallis tempus leo eu aenean sed diam.
          cta_button:
            label: кнопка cta
            type: text
            default: Свяжитесь со мной

  media:
    label: Файлы
    sections:
      files:
        type: files