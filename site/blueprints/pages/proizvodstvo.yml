title: Proizvodstvo

tabs:
  content:
    label: контент
    columns:
      - width: 2/3
        sections:
          content_fields:
            type: fields
            fields:
              title:
                label: название страницы
                type: text
              simple_hero_heading:
                label: заголовок simple hero
                type: text
                help: если пусто, используется название страницы
              simple_hero_description:
                label: описание simple hero
                type: textarea
                size: small
                buttons: false
              simple_hero_button_label:
                label: текст кнопки simple hero
                type: text
                placeholder: давайте)
              single_image:
                label: изображение секции
                type: files
                max: 1
                layout: cards
                query: page.images
              single_image_alt:
                label: alt изображения
                type: text
                width: 1/2
              big_message:
                label: текст большого сообщения
                type: text
      - width: 1/3
        sections:
          files:
            type: files

  benefits:
    label: преимущества
    sections:
      benefits_fields:
        type: fields
        fields:
          benefits_heading:
            label: заголовок преимуществ
            type: text
            default: Преимущества
          benefits_items:
            extends: fields/benefits

  cta_warmup:
    label: cta warmup
    sections:
      cta_warmup_fields:
        type: fields
        fields:
          cta_warmup_heading:
            label: заголовок cta warmup
            type: text
          cta_warmup_text:
            label: текст cta warmup
            type: textarea
            size: small
            buttons: false
          cta_warmup_button_text:
            label: текст кнопки cta warmup
            type: text
          cta_warmup_image:
            label: изображение cta warmup
            type: files
            max: 1
            layout: cards
            query: page.images
